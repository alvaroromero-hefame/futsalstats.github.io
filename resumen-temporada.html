<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Resumen de Temporada · Futsal Stats</title>
	<meta name="description" content="Los mejores jugadores de la temporada de fútbol sala">

	<style>
		:root {
			--gold:   #FFD700;
			--silver: #C0C0C0;
			--bronze: #CD7F32;
			--bg:     #0d0d1a;
			--card:   #161628;
			--card2:  #1e1e36;
			--accent: #667eea;
			--accent2:#764ba2;
			--text:   #e8e8f0;
			--muted:  #8888aa;
			--martes: #4facfe;
			--jueves: #f093fb;
			--radius: 16px;
		}

		* { box-sizing: border-box; margin: 0; padding: 0; }

		body {
			background: var(--bg);
			color: var(--text);
			font-family: 'Segoe UI', Arial, sans-serif;
			min-height: 100vh;
			overflow-x: hidden;
		}

		/* ── Hero ── */
		.hero {
			text-align: center;
			padding: 70px 20px 50px;
			background: linear-gradient(135deg, #0d0d1a 0%, #1a0a2e 50%, #0d0d1a 100%);
			position: relative;
			overflow: hidden;
		}
		.hero::before {
			content: '';
			position: absolute;
			inset: 0;
			background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(102,126,234,.25) 0%, transparent 70%);
			pointer-events: none;
		}
		.hero-badge {
			display: inline-block;
			background: linear-gradient(90deg, var(--accent), var(--accent2));
			color: #fff;
			font-size: .78rem;
			font-weight: 700;
			letter-spacing: .12em;
			text-transform: uppercase;
			padding: 6px 18px;
			border-radius: 99px;
			margin-bottom: 22px;
		}
		.hero h1 {
			font-size: clamp(2rem, 6vw, 3.6rem);
			font-weight: 900;
			line-height: 1.1;
			background: linear-gradient(135deg, #fff 30%, var(--gold));
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			background-clip: text;
			margin-bottom: 16px;
		}
		.hero p {
			color: var(--muted);
			font-size: 1.05rem;
			max-width: 540px;
			margin: 0 auto;
		}
		.trophy-row {
			font-size: 3rem;
			margin-bottom: 20px;
			letter-spacing: .3em;
		}

		/* ── Loading / Error states ── */
		.state-msg {
			text-align: center;
			padding: 60px 20px;
			color: var(--muted);
		}
		.state-msg .spinner {
			width: 48px; height: 48px;
			border: 4px solid rgba(102,126,234,.2);
			border-top-color: var(--accent);
			border-radius: 50%;
			animation: spin .9s linear infinite;
			margin: 0 auto 20px;
		}
		@keyframes spin { to { transform: rotate(360deg); } }

		/* ── Main grid ── */
		.sections {
			max-width: 1300px;
			margin: 0 auto;
			padding: 40px 20px 80px;
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(560px, 1fr));
			gap: 32px;
		}

		/* ── Category card ── */
		.cat-card {
			background: var(--card);
			border-radius: var(--radius);
			overflow: hidden;
			border: 1px solid rgba(255,255,255,.06);
			transition: transform .2s, box-shadow .2s;
		}
		.cat-card:hover {
			transform: translateY(-3px);
			box-shadow: 0 12px 40px rgba(0,0,0,.5);
		}
		.cat-header {
			padding: 20px 24px 16px;
			border-bottom: 1px solid rgba(255,255,255,.06);
			display: flex;
			align-items: center;
			gap: 12px;
		}
		.cat-icon {
			font-size: 1.8rem;
			line-height: 1;
		}
		.cat-title {
			font-size: 1.15rem;
			font-weight: 700;
			color: #fff;
		}
		.cat-subtitle {
			font-size: .78rem;
			color: var(--muted);
			margin-top: 2px;
		}

		/* ── Two-column days inside card ── */
		.days-grid {
			display: grid;
			grid-template-columns: 1fr 1fr;
		}
		.day-col {
			padding: 18px 20px 22px;
		}
		.day-col:first-child {
			border-right: 1px solid rgba(255,255,255,.06);
		}
		.day-label {
			font-size: .7rem;
			font-weight: 800;
			letter-spacing: .1em;
			text-transform: uppercase;
			margin-bottom: 14px;
			display: flex;
			align-items: center;
			gap: 6px;
		}
		.day-label.martes { color: var(--martes); }
		.day-label.jueves { color: var(--jueves); }
		.day-dot {
			width: 8px; height: 8px;
			border-radius: 50%;
			flex-shrink: 0;
		}
		.day-label.martes .day-dot { background: var(--martes); }
		.day-label.jueves .day-dot { background: var(--jueves); }

		/* ── Podium rows ── */
		.podium-row {
			display: flex;
			align-items: center;
			gap: 10px;
			padding: 9px 0;
			border-bottom: 1px solid rgba(255,255,255,.04);
			transition: background .15s;
		}
		.podium-row:last-child { border-bottom: none; }
		.podium-row:hover { background: rgba(255,255,255,.03); border-radius: 8px; padding-left: 4px; }

		.medal {
			font-size: 1.4rem;
			width: 30px;
			text-align: center;
			flex-shrink: 0;
		}
		.player-name {
			flex: 1;
			font-size: .93rem;
			font-weight: 600;
			color: #e0e0f5;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}
		.player-stat {
			font-size: .88rem;
			font-weight: 700;
			color: var(--accent);
			white-space: nowrap;
			background: rgba(102,126,234,.12);
			padding: 3px 10px;
			border-radius: 99px;
		}
		.podium-row.rank-1 .player-name { color: var(--gold); }
		.podium-row.rank-2 .player-name { color: var(--silver); }
		.podium-row.rank-3 .player-name { color: var(--bronze); }
		.podium-row.rank-1 .player-stat { background: rgba(255,215,0,.15); color: var(--gold); }
		.podium-row.rank-2 .player-stat { background: rgba(192,192,192,.12); color: var(--silver); }
		.podium-row.rank-3 .player-stat { background: rgba(205,127,50,.15); color: var(--bronze); }

		.no-data {
			color: var(--muted);
			font-size: .85rem;
			font-style: italic;
			padding: 8px 0;
		}

		/* ── Footer ── */
		.page-footer {
			text-align: center;
			padding: 30px 20px;
			color: var(--muted);
			font-size: .82rem;
			border-top: 1px solid rgba(255,255,255,.05);
		}

		/* ── Responsive ── */
		@media (max-width: 640px) {
			.sections {
				grid-template-columns: 1fr;
				padding: 24px 12px 60px;
				gap: 20px;
			}
			.days-grid {
				grid-template-columns: 1fr;
			}
			.day-col:first-child {
				border-right: none;
				border-bottom: 1px solid rgba(255,255,255,.06);
			}
			.hero { padding: 50px 16px 36px; }
		}
	</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
	<div class="trophy-row">🏆🥇🏅</div>
	<div class="hero-badge">Temporada 2024 · 2025</div>
	<h1>LA TEMPORADA<br>HA ACABADO</h1>
	<p>Estos son los mejores jugadores de la temporada. ¡Hasta la próxima!</p>
</div>

<!-- CONTENT -->
<div id="app-root">
	<div class="state-msg" id="loading-msg">
		<div class="spinner"></div>
		<p>Cargando estadísticas…</p>
	</div>
</div>

<div class="page-footer" id="page-footer" style="display:none">
	⚽ <strong>Futsal Stats</strong> · Resumen de Temporada
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

// ── Config ──────────────────────────────────────────────────
const SUPABASE_URL  = 'https://nqqbeuweyxatsxjsepnj.supabase.co';
const SUPABASE_KEY  = 'sb_publishable_lo3mmXzOCwyfYg2NnMBS3Q_v2eCoVpO';
const MIN_GAMES_PORTERO = 3; // mínimo partidos para aparecer en top porteros

// ── Supabase client ──────────────────────────────────────────
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── Load matches for a day ───────────────────────────────────
async function loadMatches(day) {
	const { data, error } = await supabase
		.from('matches')
		.select('*')
		.eq('day', day)
		.order('match_date', { ascending: true });
	if (error) throw error;
	return data || [];
}

// ── Build player stats from raw matches ─────────────────────
function buildStats(matches) {
	const players = {};

	const ensure = (name) => {
		if (!players[name]) {
			players[name] = {
				nombre: name, puntos: 0, goles: 0, asistencias: 0,
				encajados: 0, ganados: 0, empatados: 0, perdidos: 0, mvps: 0
			};
		}
		return players[name];
	};

	matches.forEach(match => {
		const blue = match.blue_lineup || [];
		const red  = match.red_lineup  || [];

		let ptBlue = 0, ptRed = 0, resBlue = '', resRed = '';
		if (match.result === 'VictoryBlue') { ptBlue = 3; resBlue = 'G'; resRed  = 'P'; }
		else if (match.result === 'VictoryRed')  { ptRed  = 3; resBlue = 'P'; resRed  = 'G'; }
		else if (match.result === 'Draw')         { ptBlue = 1; ptRed = 1; resBlue = 'E'; resRed = 'E'; }

		// MVP
		if (match.mvp && match.mvp.trim() && match.mvp.trim() !== '-') {
			ensure(match.mvp.trim()).mvps++;
		}

		// Encajados totales por equipo (para penalización)
		const encBlue = blue.reduce((s, m) => s + (m.keeper ?? m.portero ?? 0), 0);
		const encRed  = red.reduce( (s, m) => s + (m.keeper ?? m.portero ?? 0), 0);

		const process = (lineup, pts, res, encEquipo) => {
			lineup.forEach(m => {
				const p = ensure(m.name);
				p.puntos += pts;
				const g = m.goal  ?? m.goles      ?? 0;
				const a = m.assist ?? m.asistencias ?? 0;
				const k = m.keeper ?? m.portero     ?? 0;
				p.puntos      += g * 0.25 + a * 0.25 + encEquipo * -0.10;
				p.goles       += g;
				p.asistencias += a;
				p.encajados   += k;
				if (res === 'G') p.ganados++;
				if (res === 'E') p.empatados++;
				if (res === 'P') p.perdidos++;
			});
		};

		process(blue, ptBlue, resBlue, encBlue);
		process(red,  ptRed,  resRed,  encRed);
	});

	// +1 punto por MVP
	Object.values(players).forEach(p => { p.puntos += p.mvps; });

	return Object.values(players).map(p => {
		const partidos = p.ganados + p.empatados + p.perdidos;
		return {
			...p,
			partidos,
			ratioEncajados: partidos > 0
				? +(p.encajados / partidos).toFixed(2)
				: 999
		};
	});
}

// ── Top 3 helpers ─────────────────────────────────────────────
const top3 = (arr, fn, asc = false) => {
	const sorted = [...arr].sort((a, b) => asc ? fn(a) - fn(b) : fn(b) - fn(a));
	return sorted.slice(0, 3);
};

// ── Render helpers ────────────────────────────────────────────
const MEDALS = ['🥇', '🥈', '🥉'];

function renderPodium(players, statFn, statLabel) {
	if (!players.length) return `<p class="no-data">Sin datos suficientes</p>`;
	return players.map((p, i) => `
		<div class="podium-row rank-${i + 1}">
			<span class="medal">${MEDALS[i]}</span>
			<span class="player-name">${escHtml(p.nombre)}</span>
			<span class="player-stat">${statFn(p)} ${statLabel}</span>
		</div>`).join('');
}

function escHtml(str) {
	return String(str)
		.replace(/&/g, '&amp;')
		.replace(/</g, '&lt;')
		.replace(/>/g, '&gt;')
		.replace(/"/g, '&quot;');
}

function renderDayCol(dayClass, dayName, html) {
	return `
		<div class="day-col">
			<div class="day-label ${dayClass}">
				<span class="day-dot"></span>${dayName}
			</div>
			${html}
		</div>`;
}

function renderCategory({ icon, title, subtitle, martesHtml, juevesHtml }) {
	return `
		<div class="cat-card">
			<div class="cat-header">
				<span class="cat-icon">${icon}</span>
				<div>
					<div class="cat-title">${title}</div>
					<div class="cat-subtitle">${subtitle}</div>
				</div>
			</div>
			<div class="days-grid">
				${renderDayCol('martes', '📅 Martes', martesHtml)}
				${renderDayCol('jueves', '📅 Jueves', juevesHtml)}
			</div>
		</div>`;
}

// ── Main ──────────────────────────────────────────────────────
async function main() {
	try {
		const [matchesMartes, matchesJueves] = await Promise.all([
			loadMatches('martes'),
			loadMatches('jueves')
		]);

		const statsM = buildStats(matchesMartes);
		const statsJ = buildStats(matchesJueves);

		const categories = [
			{
				icon: '⭐',
				title: 'Líderes',
				subtitle: 'Jugadores con más puntos totales',
				fn: (stats) => renderPodium(
					top3(stats, p => p.puntos),
					p => p.puntos.toFixed(1),
					'pts'
				)
			},
			{
				icon: '🏅',
				title: 'Top MVPs',
				subtitle: 'Jugadores más valiosos del partido',
				fn: (stats) => renderPodium(
					top3(stats.filter(p => p.mvps > 0), p => p.mvps),
					p => p.mvps,
					'MVPs'
				)
			},
			{
				icon: '⚽',
				title: 'Top Goleadores',
				subtitle: 'Jugadores con más goles',
				fn: (stats) => renderPodium(
					top3(stats.filter(p => p.goles > 0), p => p.goles),
					p => p.goles,
					'goles'
				)
			},
			{
				icon: '🎯',
				title: 'Top Asistentes',
				subtitle: 'Jugadores con más asistencias',
				fn: (stats) => renderPodium(
					top3(stats.filter(p => p.asistencias > 0), p => p.asistencias),
					p => p.asistencias,
					'asist.'
				)
			},
			{
				icon: '🧤',
				title: 'Top Porteros',
				subtitle: `Menor ratio goles encajados/partido (mín. ${MIN_GAMES_PORTERO} partidos como portero)`,
				fn: (stats) => {
				// Solo jugadores que hayan jugado de portero (encajados > 0) y partidos suficientes
				const porteros = stats.filter(p => p.encajados > 0 && p.partidos >= MIN_GAMES_PORTERO);
					const top = top3(porteros, p => p.ratioEncajados, true /* ascendente */);
					return renderPodium(
						top,
						p => p.ratioEncajados.toFixed(2),
						'enc/ptdo'
					);
				}
			},
			{
				icon: '🏃',
				title: 'Top Jugados',
				subtitle: 'Jugadores que más partidos han disputado',
				fn: (stats) => renderPodium(
					top3(stats.filter(p => p.partidos > 0), p => p.partidos),
					p => p.partidos,
					'partidos'
				)
			}
		];

		const sectionsHtml = categories.map(cat => renderCategory({
			icon: cat.icon,
			title: cat.title,
			subtitle: cat.subtitle,
			martesHtml: cat.fn(statsM),
			juevesHtml: cat.fn(statsJ)
		})).join('');

		document.getElementById('app-root').innerHTML = `
			<div class="sections">${sectionsHtml}</div>`;
		document.getElementById('page-footer').style.display = '';

	} catch (err) {
		console.error('Error cargando datos:', err);
		document.getElementById('app-root').innerHTML = `
			<div class="state-msg">
				<p style="font-size:2rem;margin-bottom:12px">⚠️</p>
				<p>Error al cargar los datos: ${escHtml(err.message)}</p>
			</div>`;
	}
}

main();
</script>
</body>
</html>
